<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APOLLION ✦ Stellar Bond</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        background: #07030F;
        color: #EDE9FE;
        font-family: 'Georgia', serif;
        overflow: hidden;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #110823; }
      ::-webkit-scrollbar-thumb { background: #3B1C6E; border-radius: 3px; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
      @keyframes slideIn { from{transform:translateX(-20px);opacity:0} to{transform:translateX(0);opacity:1} }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
      @keyframes glow { 0%,100%{box-shadow:0 0 10px #7C3AED55} 50%{box-shadow:0 0 30px #7C3AED} }
      @keyframes starPulse { 0%,100%{text-shadow:0 0 4px #FCD34D} 50%{text-shadow:0 0 20px #FCD34D,0 0 40px #FCD34D} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
